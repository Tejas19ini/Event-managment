<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        🍽️ Confirm Your Order
    </h2>

    <div class="space-y-4">

        <!-- Quantity -->
        <input type="number" id="qty" value="1" min="1"
            class="w-full border p-2 rounded-lg"
            placeholder="Quantity">

        <!-- Phone -->
        <input type="text" id="phone" placeholder="Phone Number"
            class="w-full border p-2 rounded-lg">

        <!-- OTP -->
        <div class="flex gap-2">
            <input id="otp" type="text" placeholder="Enter OTP"
                class="flex-1 border p-2 rounded-lg">

            <button onclick="sendOTP()"
                class="bg-blue-500 text-white px-3 rounded-lg">
                Send OTP
            </button>
        </div>

        <!-- Order Button -->
        <button onclick="verifyAndProceed()"
            class="w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg">
            Proceed to Payment 💳
        </button>

        <!-- Back -->
        <button onclick="goBack()"
            class="w-full bg-gray-400 hover:bg-gray-500 text-white py-2 rounded-lg">
            Back
        </button>

    </div>

</div>

<script>

const BASE_URL = "http://localhost:1901";

// ================= SEND OTP =================
let generatedOtp;

function sendOTP() {   // ✅ FIX: name must match button onclick
    const phone = document.getElementById("phone").value;

    generatedOtp = Math.floor(100000 + Math.random() * 900000);

    console.log("OTP is:", generatedOtp); // 👈 check here

    alert("OTP sent");
}

// ================= VERIFY + GO TO PAYMENT =================
function verifyAndProceed() {   // ✅ FIX: matches button onclick
    const userOtp = document.getElementById("otp").value;

    if (userOtp == generatedOtp) {
        alert("OTP Verified ✅");

        // 👉 move to payment page
        window.location.href = "payment.html";
    } else {
        alert("Invalid OTP ❌");
    }
}

// ================= BACK =================
function goBack() {
    window.location.href = "user.html";
}

</script>

</body>
</html>
