<!DOCTYPE html>
<html>
<head>
<title>Food Menu</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen text-white bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 overflow-hidden">

<!-- 🔮 Background Blobs -->
<div class="absolute w-72 h-72 bg-white/20 rounded-full blur-3xl top-10 left-10 animate-pulse"></div>
<div class="absolute w-96 h-96 bg-pink-300/20 rounded-full blur-3xl bottom-10 right-10 animate-pulse"></div>
<div class="absolute w-80 h-80 bg-blue-300/20 rounded-full blur-3xl top-1/2 left-1/3 animate-pulse"></div>

<h1 class="text-3xl font-bold mb-6 text-center z-10 relative">Food Menu</h1>

<div class="max-w-4xl mx-auto bg-white/20 backdrop-blur-xl p-6 rounded-xl shadow-2xl z-10 relative">

    <table class="w-full bg-white/90 rounded-xl overflow-hidden text-black">
        <thead class="bg-blue-600 text-white">
            <tr>
                <th class="p-2">Food</th>
                <th>Price</th>
                <th>Type</th>
                <th>Qty</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="foodTable"></tbody>
    </table>

</div>

<script>

const BASE_URL = "http://localhost:1901";

function loadFoods() {

    fetch(BASE_URL + "/foods")
    .then(res => res.json())
    .then(data => {

        let rows = "";

        data.forEach(food => {
            rows += `
            <tr class="border-b text-center">
                <td class="p-2">${food.foodName}</td>
                <td>${food.price}</td>
                <td>${food.type}</td>

                <td>
                    <input type="number" min="1" value="1"
                    id="qty_${food.foodId}"
                    class="w-16 border p-1 rounded text-center">
                </td>

                <td>
                    <button onclick="orderFood(${food.foodId})"
                    class="bg-green-500 px-3 py-1 text-white rounded hover:bg-green-600">
                    Order
                    </button>
                </td>
            </tr>`;
        });

        document.getElementById("foodTable").innerHTML = rows;
    });
}

function orderFood(foodId) {

    const quantity = document.getElementById("qty_" + foodId).value;

    if (!quantity || quantity <= 0) {
        alert("Enter valid quantity");
        return;
    }

    // ✅ CONFIRMATION POPUP
    const confirmOrder = confirm("Do you want to place this order?");
    if (!confirmOrder) return;

    const userId = localStorage.getItem("userId");

    fetch(BASE_URL + "/orders", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            food: { foodId: foodId },
            user: { id: userId },
            quantity: quantity,
            bookingDate: new Date().toISOString().split("T")[0]
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Order placed successfully ✅");
    })
    .catch(err => console.log(err));
}

loadFoods();

</script>

</body>
</html>
