<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">

<div class="bg-black/70 p-8 rounded-xl w-80 text-white text-center backdrop-blur">

<h2 class="text-2xl mb-4">Event Login</h2>

<input id="email" type="email" placeholder="Email"
class="w-full p-2 mb-3 rounded text-black">

<input id="password" type="password" placeholder="Password"
class="w-full p-2 mb-3 rounded text-black">

<button onclick="login()"
class="w-full bg-red-500 p-2 rounded hover:bg-red-600">
Login
</button>

<p class="mt-3 text-sm">
No account? <a href="signup.html" class="text-blue-400">Signup</a>
</p>

<p id="msg" class="mt-2 text-red-400"></p>

</div>

<script>
function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

   fetch("http://localhost:1901/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    })
})
    .then(res => res.json())
    .then(data => {

    if (data.status === "success") {

        // ✅ Store user info
        localStorage.setItem("userId", data.userId);
        localStorage.setItem("role", data.role);

        window.location.href = "user.html";

        // 🔀 Redirect based on role
        if (data.role === "ADMIN") {
            window.location.href = "/admin.html";
        } else {
            window.location.href = "/users.html";
        }

    } else {
        document.getElementById("msg").innerText = "Invalid login";
    }

});
}
</script>

</body>
</html>
