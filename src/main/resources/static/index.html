<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Fade + Slide Up */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Apply animation */
.animate-fadeUp {
    animation: fadeUp 0.8s ease forwards;
}

/* Stagger effect */
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
.delay-5 { animation-delay: 0.5s; }
.delay-6 { animation-delay: 0.6s; }
</style>
</head>

<body class="min-h-screen text-white bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 overflow-x-hidden">

<div class="fixed inset-0 -z-10">
    <div class="absolute w-[500px] h-[500px] bg-purple-400 rounded-full blur-3xl opacity-20 top-[-100px] left-[-100px]"></div>
    <div class="absolute w-[400px] h-[400px] bg-pink-400 rounded-full blur-3xl opacity-20 bottom-[-100px] right-[-100px]"></div>
</div>

<!-- NAVBAR -->
<nav class="flex justify-between items-center p-5 backdrop-blur-lg bg-white/10 border-b border-white/20 sticky top-0 z-50">

    <h1 class="text-2xl font-bold tracking-wide">Global Interact 2026</h1>

    <div class="space-x-4">
        <a href="login.html" class="px-4 py-2 rounded-lg bg-white/20 hover:bg-white/30 transition">Login</a>
        <a href="register.html" class="px-4 py-2 rounded-lg bg-white/20 hover:bg-white/30 transition">Register</a>
    </div>

</nav>

<!-- HERO SECTION -->
<section class="text-center mt-20 px-4 animate-fadeUp">

    <h2 class="text-6xl font-extrabold mb-6">
        Interact 2026
    </h2>

    <p class="text-lg text-white/90 mb-8">
        Discover, Register & Enjoy College Events
    </p>

    <a href="#events" 
       class="px-8 py-4 rounded-full bg-white text-purple-600 font-semibold shadow-xl hover:scale-110 transition">
        Explore Events
    </a>

</section>

<section class="px-10 mt-20">

<div class="p-6 bg-white/20 backdrop-blur-xl rounded-2xl shadow-xl flex flex-col md:flex-row gap-4">

    <input 
        type="text"
        id="searchInput"
        placeholder="Search events..."
        class="flex-1 p-3 rounded-xl text-black"
        onkeyup="filterEvents()"
    >

    <select id="filterType" class="p-3 rounded-xl text-black" onchange="filterEvents()">
        <option value="">All Types</option>
        <option value="Concert">Concert</option>
        <option value="Conference">Conference</option>
        <option value="Exhibition">Exhibition</option>
        <option value="Ceremony">Ceremony</option>
        <option value="Festival">Festival</option>
    </select>

</div>

</section>


<!-- EVENTS PREVIEW -->
<section id="events" class="p-10 mt-16">
    <h2 class="text-3xl font-bold text-center mb-10">Upcoming Events</h2>

    <div id="eventsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</section>

<!-- FOOTER -->
<footer class="text-center p-5 mt-10 bg-black/20">
    <p>© 2026 EventHub | Built by You </p>
</footer>

<script>

let allEvents = [];

fetch("http://localhost:1901/user/events")
.then(res => res.json())
.then(data => {

    allEvents = data;
    displayEvents(allEvents);

});

// DISPLAY EVENTS
function displayEvents(events) {

    let html = "";

    events.forEach((e, index) => {

        html += `
        <div class="bg-white/20 backdrop-blur-lg p-5 rounded-2xl shadow-lg 
                    hover:scale-105 transition 
                    animate-fadeUp delay-${(index % 6) + 1}">

            <span class="absolute top-3 right-3 bg-pink-500 text-white text-xs px-2 py-1 rounded">
                ${e.eventType}
            </span>

            <h2 class="text-xl font-bold mb-2">${e.eventName}</h2>

            <p>${e.venue}</p>

            <p class="text-sm">
                ${e.date ? new Date(e.date).toDateString() : "Coming soon"}
            </p>

            <p class="text-sm mb-3">
                ${e.time ? e.time.substring(0,5) : ""}
            </p>

        </div>
        `;
    });

    document.getElementById("eventsContainer").innerHTML = html;
}


function filterEvents() {

    const search = document.getElementById("searchInput").value.toLowerCase();
    const type = document.getElementById("filterType").value;

    const filtered = allEvents.filter(e => {
        return (
            e.eventName.toLowerCase().includes(search) &&
            (type === "" || e.eventType === type)
        );
    });

    displayEvents(filtered);
}

</script>

</body>
</html>
