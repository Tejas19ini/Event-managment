<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">

<div class="bg-black/70 p-8 rounded-xl w-80 text-white text-center backdrop-blur">

<h2 class="text-2xl mb-4">Create Account</h2>

<input id="name" type="text" placeholder="Name"
class="w-full p-2 mb-3 rounded text-black">

<input id="phone" type="text" placeholder="Phone"
class="w-full p-2 mb-3 rounded text-black">

<input id="email" type="email" placeholder="Email"
class="w-full p-2 mb-3 rounded text-black">

<input id="password" type="password" placeholder="Password"
class="w-full p-2 mb-3 rounded text-black">

<select id="college" class="w-full p-2 mb-3 rounded text-black" value="College">
    <option value="1">St. Joseph\'s College,Bengaluru</option>
    <option value="2">Christ University,Bengaluru</option>
    <option value="3">Mount Carmel College,Bengaluru</option>
    <option value="4">Bangalore University,Bengaluru</option>
    <option value="5">RV College of Engineering,Bengaluru</option>
    <option value="6">PES University,Bengaluru</option>
    <option value="7">MS Ramaiah Institute of Technology,Bengaluru</option>
    <option value="8">National Institute of Fashion Technology,Bengaluru</option>
    <option value="9">Indian Institute of Science,Bengaluru</option>
    <option value="10">Global academy of technology,Bengaluru</option>
    <option value="10">Jain University,Bengaluru</option>
</select>

<select id="role" onchange="toggleAdminKey()" class="border p-2 rounded text-blue-600">
    <option value="USER">User</option>
    <option value="ADMIN">Admin</option>
</select>

<input id="adminKey" type="password"
       placeholder="Enter Admin Key"
       class="border p-2 rounded text-red-600 hidden">
<br>

<button onclick="signup()"
class="w-full bg-green-500 p-2 rounded hover:bg-green-600">
Signup
</button>

<p class="mt-3 text-sm">
Already have account? <a href="login.html" class="text-blue-400">Login</a>
</p>

<p id="msg" class="mt-2 text-red-400"></p>

</div>

<script>
function signup() {
    console.log("Signup clicked");

    fetch("http://localhost:1901/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
            adminKey: document.getElementById("adminKey").value
        })
    })
    .then(res => res.json())
    .then(data => {
    console.log(data);

    if (data.status === "success") {

        const role = document.getElementById("role").value;

        // ✅ STORE role
        localStorage.setItem("role", role);

        alert("Signup successful ✅");

        if (role === "ADMIN") {
            window.location.href = "admin.html";
        } else {
            window.location.href = "user.html";
        }

    } else {
        document.getElementById("msg").innerText = "Signup failed";
    }
})
    .catch(err => {
        console.error("Error:", err);
        document.getElementById("msg").innerText = "Server error!";
    });
}

function toggleAdminKey() {
    const role = document.getElementById("role").value;
    const keyField = document.getElementById("adminKey");

    if (role === "ADMIN") {
        keyField.classList.remove("hidden");
    } else {
        keyField.classList.add("hidden");
    }
}
</script>

</body>
</html>
