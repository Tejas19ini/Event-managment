<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-10">

<h1 class="text-3xl text-white font-bold text-center mb-8">Events Dashboard</h1>

<!-- GRID CONTAINER -->
<div id="events" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

<script>
fetch("http://localhost:1901/user/events")
.then(res => res.json())
.then(data => {

    const events = data.content ? data.content : data;

    let html = "";

    events.forEach(e => {

        html += `
        <div class="bg-white/20 backdrop-blur-lg p-5 rounded-2xl shadow-lg hover:scale-105 transition transform">

            <h2 class="text-xl font-bold text-white mb-2">
                ${e.eventName || "Event Name"}
            </h2>

            <p class="text-white/90 mb-1">
                ${e.venue || "Venue"}
            </p>

            <p class="text-white/80 text-sm">
                ${e.date || "Date not available"}
            </p>

            <p class="text-white/80 text-sm">
                ${e.time || "Time not available"}
            </p>

        </div>
        `;
    });

    document.getElementById("events").innerHTML = html;

})
.catch(err => console.log(err));
</script>

</body>
</html>
